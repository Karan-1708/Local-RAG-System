services:
  local-rag:
    build: .
    container_name: local-rag-system
    ports:
      - "8501:8501"   # Streamlit dashboard
      - "8000:8000"   # FastAPI + Swagger UI
    volumes:
      # data/ holds three things, all scoped per-chat:
      #   - data/raw/{chat_id}/      uploaded source files
      #   - data/session_state.json  persisted chat sessions (names, messages, settings)
      # Both are preserved across container restarts via this single mount.
      - ./data:/app/data
      # ChromaDB vector collections (chat_{chat_id}) and BM25 pickles (bm25_{chat_id}.pkl)
      - ./chroma_db:/app/chroma_db
      # Secrets — must exist on the host before running docker-compose up
      - ./.env:/app/.env:ro
    environment:
      # Point Tesseract at the system binary installed in the container image.
      - TESSERACT_CMD=/usr/bin/tesseract
      # Allow the container to reach Ollama running on the host machine.
      # On Linux, extra_hosts maps host.docker.internal → host-gateway.
      # On Docker Desktop (Mac/Windows), this hostname works out of the box.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
